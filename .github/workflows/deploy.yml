name: Deploy to Mittwald

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            npm install && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
        timeout-minutes: 15

      - name: Build project
        run: npm run build

      - name: Ensure .htaccess is in dist
        run: |
          cp public/.htaccess dist/.htaccess 2>/dev/null || echo ".htaccess already in dist"

      - name: Verify dist contents
        run: |
          echo "=== Checking dist folder ==="
          ls -la dist/
          echo "=== Checking dist/images folder ==="
          ls -la dist/images/ || echo "No images folder!"
          echo "=== Checking dist/assets folder ==="
          ls -la dist/assets/ || echo "No assets folder!"

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          local_path: './dist/*'
          remote_path: ${{ secrets.SFTP_PATH }}
          sftp_only: true
          delete_remote_files: true
